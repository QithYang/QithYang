<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QithYang · 我们的回忆</title>
<link rel="icon" type="image/png" href="assets/claude-logo.png">
<style>
/* === Fonts: relative paths, no embed === */
@font-face { font-family:'AnthropicSans'; src:url('fonts/AnthropicSans-Roman.woff2') format('woff2'); font-weight:normal; font-style:normal; font-display:swap; }
@font-face { font-family:'AnthropicSans'; src:url('fonts/AnthropicSans-Italic.woff2') format('woff2'); font-weight:normal; font-style:italic; font-display:swap; }
@font-face { font-family:'AnthropicSerif'; src:url('fonts/AnthropicSerif-Roman.woff2') format('woff2'); font-weight:normal; font-style:normal; font-display:swap; }
@font-face { font-family:'AnthropicSerif'; src:url('fonts/AnthropicSerif-Italic.woff2') format('woff2'); font-weight:normal; font-style:italic; font-display:swap; }
@font-face { font-family:'AnthropicMono'; src:url('fonts/AnthropicMono-Roman.woff2') format('woff2'); font-weight:normal; font-style:normal; font-display:swap; }
@font-face { font-family:'AnthropicMono'; src:url('fonts/AnthropicMono-Italic.woff2') format('woff2'); font-weight:normal; font-style:italic; font-display:swap; }

/* === Tokens === */
:root {
  --canvas:        #faf9f5;
  --surface:       #f0ede5;
  --surface-2:     #f5f2ec;
  --white:         #ffffff;
  --text-1:        #141413;
  --text-2:        #5a5751;
  --text-3:        #9b9890;
  --text-4:        #b8b5ad;
  --border:        #e8e6dc;
  --border-light:  #f0ede5;
  --orange:        #d97757;
  --orange-soft:   #f5ded3;
  --orange-bg:     #fef8f5;
  --blue:          #6a9bcc;
  --blue-soft:     #d4e4f1;
  --thinking-bg:   #f5f2ec;
  --thinking-bd:   #e8e6dc;
  --thinking-tx:   #9b9890;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--canvas);
  color: var(--text-1);
  font-family: 'AnthropicSerif', Georgia, 'Noto Serif SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif;
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
}
input, button { font-family: inherit; }

/* === Loading === */
#loading { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; background:var(--canvas); z-index:1000; }
#loading .spin { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 1s linear infinite; }
#loading .lt { font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-3); letter-spacing:0.5px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* === Picker === */
#picker { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:18px; background:var(--canvas); z-index:999; padding:24px; }
#picker.show { display:flex; }
#picker .pic-logo { width:42px; height:42px; margin-bottom:6px; }
#picker .pt { font-family:'AnthropicSans',sans-serif; font-size:18px; color:var(--text-1); }
#picker .ph { font-size:13px; color:var(--text-3); font-style:italic; margin-bottom:8px; }
#picker .drop { border:1.5px dashed var(--border); border-radius:16px; padding:48px 36px; background:var(--white); cursor:pointer; transition:all 0.2s; text-align:center; min-width:340px; }
#picker .drop:hover, #picker .drop.on { border-color:var(--orange); background:var(--orange-bg); }
#picker .drop-ic { font-size:28px; margin-bottom:12px; }
#picker .drop-t { font-family:'AnthropicSans',sans-serif; font-size:13px; color:var(--text-1); margin-bottom:4px; }
#picker .drop-h { font-size:11px; color:var(--text-3); }

/* === App layout === */
#app { display:none; height:100vh; grid-template-columns:320px 1fr; }
#app.show { display:grid; }

/* === Sidebar === */
#sidebar { display:flex; flex-direction:column; background:var(--surface); border-right:1px solid var(--border); min-width:0; }
.sb-head { padding:18px 18px 12px; border-bottom:1px solid var(--border); flex:0 0 auto; }
.sb-title-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:3px; }
.sb-title { font-family:'AnthropicSans',sans-serif; font-size:14px; color:var(--text-1); display:flex; align-items:center; gap:9px; min-width:0; }
.sb-title img { width:22px; height:22px; flex:0 0 auto; }
.sb-actions { display:flex; gap:6px; flex:0 0 auto; position:relative; }
.sb-import { width:26px; height:26px; border:1px solid var(--border); background:var(--white); border-radius:7px; cursor:pointer; font-size:14px; color:var(--text-2); display:flex; align-items:center; justify-content:center; line-height:1; padding:0; transition:all 0.15s; flex:0 0 auto; }
.sb-import:hover { border-color:var(--orange); color:var(--orange); background:var(--orange-bg); }

/* Settings dropdown */
.sm-menu { position:absolute; top:100%; right:0; margin-top:8px; background:var(--white); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 32px rgba(20,20,19,0.12), 0 2px 6px rgba(20,20,19,0.06); min-width:228px; z-index:300; padding:8px 0; display:none; }
.sm-menu.show { display:block; }
.sm-h { font-family:'AnthropicSans',sans-serif; font-size:11px; color:var(--text-3); padding:6px 14px 4px; letter-spacing:0.5px; text-transform:uppercase; }
.sm-stats { padding:2px 14px 10px; font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-2); line-height:1.55; border-bottom:1px solid var(--border-light); margin-bottom:4px; }
.sm-stats .sm-stat-num { color:var(--orange); font-weight:600; }
.sm-item { display:flex; align-items:center; gap:8px; width:100%; text-align:left; padding:9px 14px; border:none; background:transparent; cursor:pointer; font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-1); transition:background 0.12s, color 0.12s; }
.sm-item:hover { background:var(--orange-bg); color:var(--orange); }
.sm-item .sm-ic { font-size:13px; opacity:0.7; width:16px; text-align:center; }
.sm-item.danger { color:#c44; }
.sm-item.danger:hover { background:rgba(196,68,68,0.08); color:#c44; }
.sm-sep { border:none; border-top:1px solid var(--border-light); margin:4px 0; }
.sm-note { padding:4px 14px 6px; font-size:10px; color:var(--text-3); font-style:italic; }

/* Display-name settings modal */
.dn-modal { position:fixed; inset:0; background:rgba(20,20,19,0.4); display:none; align-items:center; justify-content:center; z-index:1500; backdrop-filter:blur(4px); padding:16px; }
.dn-modal.show { display:flex; }
.dn-panel { background:var(--white); border:1px solid var(--border); border-radius:14px; box-shadow:0 20px 50px rgba(20,20,19,0.18); width:340px; max-width:100%; overflow:hidden; }
.dn-title { font-family:'AnthropicSans',sans-serif; font-size:14px; color:var(--text-1); padding:16px 18px 12px; border-bottom:1px solid var(--border-light); letter-spacing:0.3px; }
.dn-body { padding:16px 18px 8px; display:flex; flex-direction:column; gap:14px; }
.dn-field { display:flex; flex-direction:column; gap:6px; }
.dn-lbl { font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-2); }
.dn-field input { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:13px; color:var(--text-1); background:var(--white); outline:none; transition:border-color 0.15s; }
.dn-field input:focus { border-color:var(--orange); }
.dn-note { font-size:11px; color:var(--text-3); font-style:italic; line-height:1.55; }
.dn-acts { display:flex; gap:8px; justify-content:flex-end; padding:12px 18px 16px; }
.dn-btn { font-family:'AnthropicSans',sans-serif; font-size:12px; padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:var(--white); color:var(--text-2); cursor:pointer; transition:all 0.15s; }
.dn-btn:hover { border-color:var(--orange); color:var(--orange); }
.dn-btn.primary { background:var(--orange); color:white; border-color:var(--orange); }
.dn-btn.primary:hover { background:#c66648; }

.sb-sub { font-size:11px; color:var(--text-3); font-style:italic; margin-bottom:12px; padding-left:31px; }
.sb-tabs-top { display:flex; gap:0; margin-bottom:12px; border-bottom:1px solid var(--border); }
.sb-tab-top { flex:1; background:none; border:none; padding:8px 0 9px; font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-3); cursor:pointer; letter-spacing:0.4px; position:relative; transition:color 0.15s; }
.sb-tab-top:hover { color:var(--text-2); }
.sb-tab-top.on { color:var(--text-1); }
.sb-tab-top.on::after { content:''; position:absolute; left:50%; bottom:-1px; transform:translateX(-50%); width:24px; height:2px; background:var(--orange); border-radius:2px; }
.sb-search { position:relative; }
.sb-search input { width:100%; padding:8px 12px 8px 30px; border:1px solid var(--border); border-radius:10px; background:var(--white); font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-1); outline:none; transition:border-color 0.15s; }
.sb-search input:focus { border-color:var(--orange); }
.sb-search::before { content:'⌕'; position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:14px; opacity:0.45; pointer-events:none; }

#conv-list { flex:1; overflow-y:auto; padding:6px 0; }
.conv-item { position:relative; padding:13px 18px 12px; cursor:pointer; border-bottom:1px solid var(--border-light); transition:background 0.15s; }
.conv-item:hover { background:rgba(217,119,87,0.05); }
.conv-item.active { background:var(--orange-bg); }
.conv-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--orange); }
.conv-title { font-family:'AnthropicSans',sans-serif; font-size:13px; color:var(--text-1); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:26px; line-height:1.4; }
.conv-meta { font-size:11px; color:var(--text-3); font-family:'AnthropicSans',sans-serif; }
.conv-del { position:absolute; right:10px; top:50%; transform:translateY(-50%); height:22px; min-width:22px; border:none; background:transparent; color:var(--text-3); cursor:pointer; border-radius:5px; opacity:0; transition:opacity 0.15s; font-size:15px; display:flex; align-items:center; justify-content:center; padding:0 5px; }
.conv-item:hover .conv-del { opacity:0.7; }
.conv-del:hover { background:rgba(196,68,68,0.12); color:#c44; opacity:1; }
.conv-del.confirm { opacity:1; background:#c44; color:white; font-size:10px; padding:0 9px; font-family:'AnthropicSans',sans-serif; white-space:nowrap; }
.empty-list { padding:30px 20px; text-align:center; color:var(--text-3); font-size:12px; font-style:italic; }

/* === Main === */
#main { display:flex; flex-direction:column; min-width:0; background:var(--canvas); position:relative; height:100vh; }
.main-head { padding:14px 24px; border-bottom:1px solid var(--border); background:rgba(250,249,245,0.94); backdrop-filter:blur(20px); display:flex; align-items:center; gap:12px; flex:0 0 auto; z-index:10; }
.mh-hb { display:none; width:34px; height:34px; border:1px solid var(--border); background:var(--white); border-radius:8px; cursor:pointer; align-items:center; justify-content:center; font-size:15px; color:var(--text-2); }
.mh-c { flex:1; min-width:0; text-align:center; padding:0 8px; }
.mh-t { font-family:'AnthropicSans',sans-serif; font-size:15px; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mh-m { font-size:11px; color:var(--text-3); font-family:'AnthropicSans',sans-serif; margin-top:2px; font-style:italic; }
.mh-acts { display:flex; gap:6px; flex:0 0 auto; }
.ibtn { width:34px; height:34px; border:1px solid var(--border); background:var(--white); border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text-2); transition:all 0.15s; }
.ibtn:hover { border-color:var(--orange); background:var(--orange-bg); }
.ibtn.on { background:var(--orange-soft); border-color:var(--orange); }

/* === Search bar === */
.search-bar { display:none; flex-direction:column; padding:12px 24px; border-bottom:1px solid var(--border); background:var(--surface-2); flex:0 0 auto; }
.search-bar.show { display:flex; }
.sb-row { display:flex; align-items:center; gap:10px; }
.sb-tabs { display:flex; gap:4px; flex:0 0 auto; }
.sb-tab { font-family:'AnthropicSans',sans-serif; font-size:11px; padding:6px 12px; border-radius:14px; border:1px solid var(--border); background:var(--white); color:var(--text-2); cursor:pointer; transition:all 0.15s; }
.sb-tab.on { background:var(--orange); color:white; border-color:var(--orange); }
.sb-row > input { flex:1; min-width:0; padding:7px 12px; border:1px solid var(--border); border-radius:8px; background:var(--white); font-size:12px; outline:none; }
.sb-row > input:focus { border-color:var(--orange); }
.sb-stats { font-size:11px; color:var(--text-3); font-family:'AnthropicSans',sans-serif; min-width:56px; text-align:center; }
.sb-nav { display:flex; gap:4px; }
.sb-nav button { width:26px; height:26px; border:1px solid var(--border); background:var(--white); border-radius:6px; cursor:pointer; font-size:10px; color:var(--text-2); }
.sb-nav button:hover { background:var(--orange-bg); border-color:var(--orange); }
.sb-close { width:26px; height:26px; border:1px solid var(--border); background:var(--white); border-radius:6px; cursor:pointer; font-size:14px; color:var(--text-2); display:flex; align-items:center; justify-content:center; line-height:1; }
.sb-close:hover { border-color:var(--orange); color:var(--orange); }
.sb-results { max-height:300px; overflow-y:auto; background:var(--white); border:1px solid var(--border); border-radius:8px; display:none; margin-top:10px; }
.sb-results.show { display:block; }
.sb-result { padding:11px 14px; border-bottom:1px solid var(--border-light); cursor:pointer; font-size:12px; transition:background 0.15s; }
.sb-result:last-child { border-bottom:none; }
.sb-result:hover { background:var(--orange-bg); }
.sb-result-title { font-family:'AnthropicSans',sans-serif; color:var(--text-1); margin-bottom:4px; font-weight:600; }
.sb-result-snip { color:var(--text-2); line-height:1.5; }
.sb-result mark { background:var(--orange-soft); color:var(--orange); padding:0 2px; border-radius:2px; }

/* === Views (chat/fav/timeline) === */
.msgs-wrap, .fav-view, .tl-view { display:none; flex:1; overflow-y:auto; }
.msgs-wrap.show, .fav-view.show, .tl-view.show { display:block; }
.msgs-wrap { padding:0 24px 60px; }
.fav-view, .tl-view { padding:24px 24px 60px; }
.tl-view { position:relative; }
.msgs-in { max-width:760px; margin:0 auto; padding-top:18px; }
.empty { display:flex; align-items:center; justify-content:center; height:100%; min-height:300px; color:var(--text-3); font-style:italic; font-size:14px; }

.dsep { text-align:center; padding:30px 0 10px; }
.dsep span { font-family:'AnthropicSans',sans-serif; font-size:11px; color:var(--text-3); letter-spacing:0.8px; text-transform:uppercase; }

/* user message — bubble on right, "你" beside top-right of bubble (matching reference) */
.msg.user { padding:10px 0; position:relative; }
.msg.user .msg-row { display:flex; flex-direction:row; justify-content:flex-end; gap:10px; align-items:flex-start; }
.msg.user .bubble { background:var(--surface); border-radius:20px; padding:14px 20px; max-width:78%; font-size:15px; line-height:1.78; color:var(--text-1); word-break:break-word; order:1; }
.msg.user .u-name { order:2; font-family:'AnthropicSans',sans-serif; font-size:13px; color:var(--text-2); align-self:flex-start; margin-top:4px; flex-shrink:0; letter-spacing:0.3px; }
.msg.user .u-time { text-align:right; font-size:11px; color:var(--text-3); font-family:'AnthropicSans',sans-serif; padding:6px 50px 0 0; }

/* assistant message — flat, left-aligned, indented body */
.msg.ai { padding:20px 0; border-bottom:1px solid var(--border-light); position:relative; }
.msg.ai:last-of-type { border-bottom:none; }
.msg.ai .a-head { display:flex; align-items:center; gap:10px; margin-bottom:11px; }
.msg.ai .a-av { width:26px; height:26px; flex:0 0 auto; object-fit:contain; }
.msg.ai .a-name { font-family:'AnthropicSans',sans-serif; font-size:13px; color:var(--text-2); letter-spacing:0.2px; }
.msg.ai .a-time { font-family:'AnthropicSans',sans-serif; font-size:11px; color:var(--text-3); margin-left:2px; }
.msg.ai .body { padding-left:38px; }

/* shared text */
.msg-text { font-size:15px; line-height:1.82; color:var(--text-1); word-break:break-word; }
.msg-text p { margin:0; }
.msg-text .sp { height:10px; }
.msg-text strong { font-weight:600; }
.msg-text em { font-style:italic; }
.msg-text del { color:var(--text-3); }
.msg-text code { font-family:'AnthropicMono',monospace; background:var(--surface); border-radius:4px; padding:1px 6px; font-size:13px; color:var(--orange); }
.msg-text pre { background:var(--surface); border-radius:8px; padding:12px 14px; overflow-x:auto; margin:10px 0; }
.msg-text pre code { background:transparent; color:var(--text-1); padding:0; font-size:13px; }
.msg-text blockquote { border-left:2px solid var(--orange); padding-left:14px; margin:10px 0; color:var(--text-2); font-style:italic; font-size:14.5px; }
.msg-text h1, .msg-text h2, .msg-text h3, .msg-text h4, .msg-text h5, .msg-text h6 { font-family:'AnthropicSerif', Georgia, serif; color:var(--text-1); font-weight:600; line-height:1.35; margin:14px 0 6px; }
.msg-text h1 { font-size:22px; }
.msg-text h2 { font-size:19px; }
.msg-text h3 { font-size:17px; }
.msg-text h4 { font-size:15.5px; }
.msg-text h5 { font-size:14.5px; color:var(--text-2); }
.msg-text h6 { font-size:13.5px; color:var(--text-2); letter-spacing:0.3px; }
.msg-text a { color:var(--blue); text-decoration:underline; text-decoration-color:var(--blue-soft); text-underline-offset:2px; }
.msg-text a:hover { text-decoration-color:var(--blue); }
.msg-text mark { background:rgba(217,119,87,0.28); color:inherit; padding:0 2px; border-radius:2px; }
.msg.user .msg-text code { background:var(--white); }

/* Files / attachments */
.msg-file { font-family:'AnthropicSans',sans-serif; font-size:12px; color:var(--text-2); background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:7px 11px; display:inline-block; margin:4px 6px 6px 0; }
.msg.user .msg-file { background:var(--white); }
details.msg-file-text { padding:0; display:block; max-width:100%; }
details.msg-file-text > summary { cursor:pointer; padding:7px 11px; user-select:none; list-style:none; }
details.msg-file-text > summary::-webkit-details-marker { display:none; }
details.msg-file-text[open] > summary { border-bottom:1px solid var(--border); }
details.msg-file-text > pre { margin:0; padding:10px 12px; background:var(--surface); border-radius:0 0 7px 7px; font-family:'AnthropicMono',monospace; font-size:12px; line-height:1.55; color:var(--text-1); white-space:pre-wrap; word-break:break-word; max-height:360px; overflow:auto; }
.msg-file-image { color:var(--text-2); }
.msg-file-binary { color:var(--text-2); }
.msg-block-unknown { font-family:'AnthropicMono',monospace; font-size:11px; color:var(--text-3); background:var(--surface); border:1px dashed var(--border); border-radius:6px; padding:6px 10px; margin:6px 0; display:inline-block; }

/* token_budget — minimal ghost marker (low-signal, just a quiet trail) */
.msg-block-marker { display:inline-block; font-family:'AnthropicSans',sans-serif; font-size:10.5px; color:var(--text-3); background:transparent; border:1px dashed var(--border); border-radius:10px; padding:1px 8px; margin:4px 4px 4px 0; letter-spacing:0.3px; opacity:0.7; }

/* tool_use / tool_result — reuse thinking pill/collapse aesthetic */
.msg-tool { margin:8px 0; font-family:'AnthropicSans',sans-serif; }
.msg-tool > summary { display:inline-flex; align-items:center; gap:6px; cursor:pointer; padding:4px 12px; border-radius:16px; background:var(--surface); border:none; font-size:11px; color:var(--text-3); user-select:none; list-style:none; }
.msg-tool > summary::-webkit-details-marker { display:none; }
.msg-tool > summary:hover { background:#e8e6dc; }
.msg-tool .tool-ic { font-size:9px; width:9px; display:inline-block; text-align:center; }
.msg-tool[open] .tool-ic::before { content:'\25BE'; }
.msg-tool:not([open]) .tool-ic::before { content:'\25B8'; }
.msg-tool > .tool-body { background:var(--thinking-bg); border:none; border-radius:14px; padding:12px 16px; margin-top:8px; color:var(--text-2); font-size:12.5px; line-height:1.6; }
.msg-tool > .tool-body pre { margin:6px 0; padding:8px 10px; background:var(--surface); border-radius:6px; font-family:'AnthropicMono',monospace; font-size:12px; color:var(--text-1); white-space:pre-wrap; word-break:break-word; max-height:300px; overflow:auto; }
.msg-tool > .tool-body .tool-meta { font-size:11px; color:var(--text-3); margin-bottom:4px; }
.msg-tool > .tool-body img.tool-icon { width:14px; height:14px; vertical-align:-2px; margin-right:4px; border-radius:2px; }
.msg-tool.is-error > summary { color:#a14a4a; }
.msg-tool.is-error > .tool-body { background:#fdf0ee; color:#5a2a2a; }
.msg-tool.is-error > .tool-body pre { background:#fff; }

/* flag block — safety helpline (e.g. self-harm intervention). Amber, not red, to avoid alarm. */
.msg-block-flag { display:block; border:1px solid #d9a55a; background:#fdf6ea; border-radius:10px; padding:12px 14px; margin:10px 0; font-family:'AnthropicSans',sans-serif; }

.msg-block-flag .flag-row a { color:#7a4b0d; text-decoration:underline; text-decoration-color:#d9a55a; text-underline-offset:2px; word-break:break-all; }
.msg-block-flag .flag-row a:hover { text-decoration-color:#7a4b0d; }

/* Thinking — pill toggle + left-bar content */
.thinking { margin-bottom:12px; }
.th-toggle { display:inline-flex; align-items:center; gap:6px; cursor:pointer; padding:4px 12px; border-radius:16px; background:var(--surface); border:none; font-family:'AnthropicSans',sans-serif; font-size:11px; color:var(--text-3); user-select:none; transition:background 0.15s; }

.th-content { display:none; background:var(--thinking-bg); border:none; border-radius:20px; padding:14px 20px; margin-top:8px; color:var(--text-3); font-size:13px; line-height:1.65; }
.th-content.open { display:block; }
.th-content p { margin:0; }
.th-content .th-sp { height:6px; }
.th-content .th-block + .th-block { margin-top:14px; }

/* Favorite button */
.msg-fav { position:absolute; border:none; background:transparent; cursor:pointer; font-size:17px; color:var(--text-3); opacity:0; transition:opacity 0.15s, color 0.15s, background 0.15s; width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; padding:0; line-height:1; }
.msg.user .msg-fav { right:50px; top:14px; }
.msg.ai .msg-fav { right:0; top:18px; }
.msg:hover .msg-fav { opacity:0.6; }
.msg-fav:hover { opacity:1 !important; background:var(--orange-bg); color:var(--orange); }

/* Fade-in animation */
@keyframes fi { from { opacity:0; transform:translateY(2px); } to { opacity:1; transform:none; } }
.msg { animation:fi 0.22s ease both; }

/* End mark */
.endm { text-align:center; padding:60px 0 30px; display:flex; flex-direction:column; gap:8px; align-items:center; }
.endm .e1 { font-size:15px; color:var(--text-2); font-family:'AnthropicSerif',serif; letter-spacing:1px; }
.endm .e2 { font-style:italic; color:var(--text-3); font-size:13px; font-family:'AnthropicSerif',serif; }

/* === Favorites view === */
.view-h { font-family:'AnthropicSans',sans-serif; font-size:18px; color:var(--text-1); max-width:760px; margin:0 auto 20px; padding-top:6px; }
.view-h .vh-sub { font-size:11px; color:var(--text-3); font-style:italic; margin-top:3px; }

.fav-item:hover { border-color:var(--orange); background:var(--orange-bg); transform:translateY(-1px); }

.tl-month { max-width:760px; margin:0 auto 32px; }
.tl-month-title { font-family:'AnthropicSans',sans-serif; font-size:14px; color:var(--text-2); margin-bottom:14px; padding-bottom:6px; border-bottom:1px solid var(--border-light); }

.tl-popover::before { content:''; position:absolute; top:-6px; left:50%; transform:translateX(-50%) rotate(45deg); width:10px; height:10px; background:var(--white); border-left:1px solid var(--border); border-top:1px solid var(--border); }

/* === Mobile === */
.sb-overlay { display:none; }
@media (max-width: 768px) {
  #app { grid-template-columns:1fr; }
  #sidebar { position:fixed; left:0; top:0; bottom:0; width:85%; max-width:320px; z-index:200; transform:translateX(-100%); transition:transform 0.28s ease; box-shadow:0 8px 32px rgba(0,0,0,0.12); }

  .sb-row > input { order:10; flex:1 1 100%; margin-top:6px; }
}

<script>

// === QithYang module (Phase 4-rewrite) ===
window.QithYang = (() => {

  // ===== state (DECISION 3: simple mutable plain object) =====
  const state = {
    RAW: null,
    RAW_BY_ID: {},
    CONVS: [],
    curConvId: null,
    curConv: null,
    showThinking: false,
    view: 'chat',
    favs: {},
    deletedConvs: new Set(),
    convFilter: '',
    searchScope: 'current',
    searchQ: '',
    searchMatches: [],
    searchMatchIdx: 0,
    searchTimer: null,
    lastSaveOk: true,
  };

  // ===== utils (verbatim from original lines 604-671) =====
  function pad2(n) { return String(n).padStart(2,'0'); }
  function fmtFullCN(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }
  function fmtMD(iso) {
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }
  function fmtDateCN(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }
  function fmtDayKey(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  // === Markdown ===
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
  function formatSize(n) {
    if (typeof n !== 'number' || !isFinite(n) || n < 0) return '';
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n/1024).toFixed(1)} KB`;
    return `${(n/(1024*1024)).toFixed(1)} MB`;
  }
  function inferKind(name) {
    const ext = String(name || '').toLowerCase().match(/\.[a-z0-9]+$/);
    const e = ext ? ext[0] : '';
    if (['.jpg','.jpeg','.png','.webp','.gif','.bmp'].includes(e)) return 'image';
    if (['.md','.html','.txt','.json','.yaml','.yml','.log','.csv'].includes(e)) return 'text';
    return 'file';
  }
  function renderInline(s) {
    let h = escHtml(s);
    // links [text](url)
    h = h.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    // bold-italic / bold / italic
    h = h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h = h.replace(/(?<![*\w])\*([^*\n]+?)\*(?!\w)/g,'<em>$1</em>');
    // inline code
    h = h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
    // strike
    h = h.replace(/~~(.+?)~~/g,'<del>$1</del>');
    return h;
  }
  function renderMarkdown(text, hl) {
    if (!text) return '';
    const lines = text.split('\n');
    let h = '', bq = [], inCode = false, codeLines = [];
    function flushBq() { if (bq.length) { h += '<blockquote>'+bq.map(l=>renderInline(l)).join('<br>')+'</blockquote>'; bq = []; } }
    function flushCode() { if (codeLines.length) { h += '<pre><code>'+escHtml(codeLines.join('\n'))+'</code></pre>'; codeLines = []; } }
    for (const line of lines) {
      if (line.startsWith('```')) {
        if (inCode) { flushCode(); inCode = false; }
        else { flushBq(); inCode = true; }
        continue;
      }
      if (inCode) { codeLines.push(line); continue; }
      const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
      if (hMatch) {
        flushBq();
        const level = hMatch[1].length;
        h += `<h${level}>${renderInline(hMatch[2])}</h${level}>`;
        continue;
      }
      if (line.startsWith('> ') || line === '>') {
        bq.push(line.replace(/^>\s?/,''));
      } else {
        flushBq();
        h += line.trim()==='' ? '<div class="sp"></div>' : '<p>'+renderInline(line)+'</p>';
      }
    }
    flushBq();
    flushCode();
    if (hl) {
      const re = new RegExp('('+escapeRegExp(hl)+')','gi');
      h = h.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, txt) => {
        if (tag) return tag;
        return txt.replace(re, '<mark>$1</mark>');
      });
    }
    return h;
  }

  // ===== storage (idb + ls; DB schema fixed per spec, see plan §二.C) =====
  // localStorage display-name keys
  const DN_USER_KEY = 'qithyang_user_name';
  const DN_ASST_KEY = 'qithyang_assistant_name';
  // IndexedDB schema (DO NOT CHANGE)
  const DB_NAME = 'QithYang';
  const DB_VERSION = 1;
  const STORES = ['conversations', 'favs', 'deletedConvs'];
  let _db = null;

  function idbOpen() {
    if (_db) return Promise.resolve(_db);
    return new Promise((resolve, reject) => {
      if (!('indexedDB' in window)) { reject(new Error('IndexedDB not supported')); return; }
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('conversations')) db.createObjectStore('conversations', { keyPath:'uuid' });
        if (!db.objectStoreNames.contains('favs')) db.createObjectStore('favs', { keyPath:'key' });
        if (!db.objectStoreNames.contains('deletedConvs')) db.createObjectStore('deletedConvs', { keyPath:'uuid' });
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error('IndexedDB open blocked'));
    });
  }
  function idbTx(stores, mode) { return _db.transaction(stores, mode); }
  function idbGetAll(storeName) {
    return new Promise((resolve, reject) => {
      const tx = idbTx([storeName], 'readonly');
      const req = tx.objectStore(storeName).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }
  function idbBulkPut(storeName, items) {
    return new Promise((resolve, reject) => {
      if (!items.length) { resolve(0); return; }
      const tx = idbTx([storeName], 'readwrite');
      const store = tx.objectStore(storeName);
      for (const it of items) store.put(it);
      tx.oncomplete = () => resolve(items.length);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });
  }
  function idbPut(storeName, item) {
    return new Promise((resolve, reject) => {
      const tx = idbTx([storeName], 'readwrite');
      tx.objectStore(storeName).put(item);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  function idbDelete(storeName, key) {
    return new Promise((resolve, reject) => {
      const tx = idbTx([storeName], 'readwrite');
      tx.objectStore(storeName).delete(key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  function idbClear(storeName) {
    return new Promise((resolve, reject) => {
      const tx = idbTx([storeName], 'readwrite');
      tx.objectStore(storeName).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  function idbCount(storeName) {
    return new Promise((resolve, reject) => {
      const tx = idbTx([storeName], 'readonly');
      const req = tx.objectStore(storeName).count();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  // Fav single toggle (fire-and-forget)
  function idbSaveFav(key, on) {
    (on ? idbPut('favs', { key }) : idbDelete('favs', key)).catch(e => console.warn('fav save', e));
  }
  // Deleted conv add (fire-and-forget)
  function idbSaveDeleted(uuid) {
    idbPut('deletedConvs', { uuid }).catch(e => console.warn('del save', e));
  }

  // localStorage helpers
  function lsGetUserName() { return localStorage.getItem(DN_USER_KEY) || '你'; }
  function lsGetAssistantName() { return localStorage.getItem(DN_ASST_KEY) || 'Claude'; }
  function lsSetDisplayNames(u, a) {
    const uT = (u || '').trim(), aT = (a || '').trim();
    if (uT) localStorage.setItem(DN_USER_KEY, uT); else localStorage.removeItem(DN_USER_KEY);
    if (aT) localStorage.setItem(DN_ASST_KEY, aT); else localStorage.removeItem(DN_ASST_KEY);
  }
  // One-time migration from old localStorage keys (xy_raw / xy_favs / xy_del)
  async function lsMigrateLegacy() {
    const oldRaw = localStorage.getItem('xy_raw');
    const oldFavs = localStorage.getItem('xy_favs');
    const oldDel = localStorage.getItem('xy_del');
    if (!oldRaw && !oldFavs && !oldDel) return false;
    try {
      if (oldRaw) {
        const arr = JSON.parse(oldRaw);
        if (Array.isArray(arr) && arr.length) await idbBulkPut('conversations', arr);
      }
      if (oldFavs) {
        const obj = JSON.parse(oldFavs) || {};
        const items = Object.keys(obj).filter(k => obj[k]).map(k => ({ key:k }));
        if (items.length) await idbBulkPut('favs', items);
      }
      if (oldDel) {
        const arr = JSON.parse(oldDel);
        if (Array.isArray(arr) && arr.length) await idbBulkPut('deletedConvs', arr.map(uuid => ({ uuid })));
      }
      localStorage.removeItem('xy_raw');
      localStorage.removeItem('xy_favs');
      localStorage.removeItem('xy_del');
      return true;
    } catch (e) { console.warn('migrate legacy failed', e); return false; }
  }

  // ===== filter: real conversation check (Phase 3 promote) =====
  // A conversation is "real" iff its `name` is a non-empty string.
  // Phase 3 audit: 47 real + 10 empty-name + 0 null/missing = 57 total.
  function isRealConversation(conv) {
    return typeof conv?.name === 'string' && conv.name !== '';
  }

  // ===== filter: schema-drift detector (DECISION 4, passive console.warn) =====
  // Detect conv.name shapes Phase 3 has not seen. Behaviour unchanged — this is audit only.
  function schemaDriftDetector(conv) {
    if (conv?.name == null) {
      console.warn('[schema-drift] conv.name is null/undefined:', conv && conv.uuid);
    } else if (typeof conv.name !== 'string') {
      console.warn('[schema-drift] conv.name non-string:', conv.uuid, typeof conv.name);
    } else if (conv.name === '') {
      // known empty — no warn (Phase 3 baseline includes 10 of these)
    } else if (conv.name.trim() === '') {
      console.warn('[schema-drift] conv.name whitespace-only:', conv.uuid);
    } else if (['Untitled', 'New Chat', 'New Conversation'].includes(conv.name)) {
      console.warn('[schema-drift] possible placeholder name:', conv.uuid, conv.name);
    }
  }

  // ===== normalizer =====
  // getMsgData output schema (post-4c dedup): { text, thinkingBlocks, files }
  // files merges msg.files + msg.attachments deduped by file_name / file_uuid;
  // extracted_content (from attachments) is preserved; kind ∈ {image, text, file}.
  // See plan §七 Bug 2.
  function getMsgData(msg) {
    let textParts = [], thinkingParts = [];
    for (const c of (msg.content || [])) {
      if (c.type === 'text' && c.text) textParts.push(c.text);
      else if (c.type === 'thinking' && c.thinking) thinkingParts.push(c.thinking);
    }
    // dedup files + attachments
    const byKey = new Map();
    function keyOf(o) {
      // file_name 优先 — attachments[] 没 file_uuid 字段 (phase4c data §2.2), uuid 优先
      // 会让真实数据 60/63 同名 entity 永远不 merge. 见 commit 16 message + dedup test.
      return (typeof o.file_name === 'string' && o.file_name.length > 0 ? o.file_name : null)
          || o.file_uuid
          || JSON.stringify(o);
    }
    for (const f of (msg.files || [])) {
      const k = keyOf(f);
      if (!byKey.has(k)) byKey.set(k, { ...f });
    }
    for (const a of (msg.attachments || [])) {
      const k = keyOf(a);
      if (byKey.has(k)) {
        const ex = byKey.get(k);
        // attachments may carry extracted_content / file_size that files lacks
        if (a.extracted_content != null && ex.extracted_content == null) ex.extracted_content = a.extracted_content;
        if (a.file_size != null && ex.file_size == null) ex.file_size = a.file_size;
      } else {
        byKey.set(k, { ...a });
      }
    }
    const dedupedFiles = [];
    for (const f of byKey.values()) {
      // attachments with extracted_content are always inline-renderable text
      const kind = (f.extracted_content != null && f.extracted_content !== '')
        ? 'text'
        : inferKind(f.file_name);
      dedupedFiles.push({ ...f, kind });
    }
    return {
      text: textParts.join('\n\n'),
      thinkingBlocks: thinkingParts,
      files: dedupedFiles,
    };
  }
  // A msg is "visible" if it would render to something non-empty. Originally
  // only text / thinking / files counted (Phase 3 era — pre-tool blocks).
  // After commit 8-11 added tool_use / tool_result / flag / token_budget
  // handlers, renderMessages skips a msg only when its computed extraHtml is
  // also empty; we mirror that here so msgCount / firstDate / lastDate /
  // timeline date-keying match what the user sees rendered. The block-type
  // probe confirmed every block carries `type` as a string (shape invariant),
  // so checking `msg.content[].type in known set` is safe and zero-fallback.
  const EXTRA_VISIBLE_TYPES = new Set(['tool_use', 'tool_result', 'flag', 'token_budget']);
  function hasExtraVisibleBlock(msg) {
    if (!msg || !Array.isArray(msg.content)) return false;
    for (const b of msg.content) {
      if (b && typeof b === 'object' && EXTRA_VISIBLE_TYPES.has(b.type)) return true;
    }
    return false;
  }
  function isMsgVisible(msg) {
    const d = getMsgData(msg);
    if (d.text || d.thinkingBlocks.length || d.files.length) return true;
    return hasExtraVisibleBlock(msg);
  }
  function extractTitle(c) {
    if (c.name && c.name.trim()) return c.name.trim();
    for (const m of c.chat_messages) {
      if (m.sender === 'human') {
        const txt = (m.content||[]).find(x => x.type==='text' && x.text)?.text || m.text;
        if (txt) {
          const clean = txt.replace(/\s+/g,' ').trim();
          return clean.length > 30 ? clean.slice(0,30)+'…' : clean;
        }
      }
    }
    return '未命名对话';
  }
  // normalize(filteredConvs) → [{uuid, title, chat_messages, firstDate, lastDate, msgCount, updated_at, created_at}]
  // 输入应已过 isRealConversation + deletedConvs filter。本函数内不再做 D1/D3 防御性 filter
  // (Phase 3 隐含,见 plan §九)。
  function normalize(filteredConvs) {
    return filteredConvs
      .map(c => {
        const visible = c.chat_messages.filter(isMsgVisible);
        return {
          uuid: c.uuid,
          title: extractTitle(c),
          chat_messages: c.chat_messages,
          firstDate: visible[0].created_at,
          lastDate: visible[visible.length-1].created_at,
          msgCount: visible.length,
          updated_at: c.updated_at,
          created_at: c.created_at,
        };
      })
      .sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
  }

  // ===== parser: merge raw arrays into state.RAW_BY_ID,
  // dedupe by uuid keeping the version with the most messages =====
  function parserParse(raw) {
    if (!Array.isArray(raw)) return { added:0, updated:0, kept:0, changedIds:[] };
    let added = 0, updated = 0, kept = 0;
    const changedIds = [];
    for (const c of raw) {
      if (!c || !c.uuid || !Array.isArray(c.chat_messages)) continue;
      const ex = state.RAW_BY_ID[c.uuid];
      if (!ex) {
        state.RAW_BY_ID[c.uuid] = c;
        added++;
        changedIds.push(c.uuid);
      } else if (c.chat_messages.length > ex.chat_messages.length) {
        state.RAW_BY_ID[c.uuid] = c;
        updated++;
        changedIds.push(c.uuid);
      } else {
        kept++;
      }
    }
    return { added, updated, kept, changedIds };
  }

  // ===== renderer: registry-style block handlers (see plan §六) =====
  // Each handler: (block, ctx) => htmlString.
  // ctx may carry { hl } (highlight query) etc. Handlers must escape any
  // free-form strings via escHtml; rich text goes through renderMarkdown.
  const blockHandlers = {};
  function registerBlock(type, handler) {
    if (typeof type !== 'string' || typeof handler !== 'function') throw new Error('registerBlock: bad args');
    blockHandlers[type] = handler;
  }
  function renderUnknownBlock(block) {
    console.warn('[unknown block type]', block && block.type, block);
    const t = block && block.type != null ? String(block.type) : '(no type)';
    const n = block && typeof block === 'object' ? Object.keys(block).length : 0;
    return `<div class="msg-block-unknown">[${escHtml(t)} block, ${n} fields]</div>`;
  }
  function dispatchBlock(block, ctx) {
    if (!block || typeof block !== 'object') return '';
    const handler = blockHandlers[block.type] || renderUnknownBlock;
    return handler(block, ctx || {});
  }

  // text handler — markdown render (heading branch already in renderMarkdown)
  registerBlock('text', (b, ctx) => {
    if (!b.text) return '';
    return `<div class="msg-text">${renderMarkdown(b.text, (ctx && ctx.hl) || '')}</div>`;
  });

  // thinking handler — collapsible block. Note: renderMessages currently
  // aggregates msg.content[].thinking into d.thinkingBlocks and renders them
  // together in one .thinking wrapper, so this per-block handler exists for
  // F1's dispatch fallback path / future migration, not the current message
  // rendering path. It still emits a sensible collapsed marker if used.
  registerBlock('thinking', (b /* , ctx */) => {
    if (!b.thinking) return '';
    const inner = String(b.thinking).split('\n').map(l => l.trim() ? `<p>${escHtml(l)}</p>` : '<div class="th-sp"></div>').join('');
    const status = b.cut_off ? ' · 已截断' : (b.truncated ? ' · 已截断' : '');
    return `<div class="thinking">
      <button type="button" class="th-toggle"><span class="th-ico">▸</span><span class="th-lbl">思考${status}</span></button>
      <div class="th-content"><div class="th-block">${inner}</div></div>
    </div>`;
  });

  // tool_use / tool_result helpers
  // display_content is server-provided pretty rendering:
  //   { type:'code_block', language:'bash', code:'...' }
  //   { type:'json_block', json_block:'...' }
  function renderDisplayContent(dc) {
    if (!dc || typeof dc !== 'object') return '';
    if (dc.type === 'code_block' && typeof dc.code === 'string') {
      const lang = dc.language ? ` data-lang="${escHtml(dc.language)}"` : '';
      const fname = dc.filename ? `<div class="tool-meta">${escHtml(dc.filename)}</div>` : '';
      return `${fname}<pre${lang}><code>${escHtml(dc.code)}</code></pre>`;
    }
    if (dc.type === 'json_block' && typeof dc.json_block === 'string') {
      return `<pre><code>${escHtml(dc.json_block)}</code></pre>`;
    }
    // unknown display_content shape — render as JSON
    try { return `<pre><code>${escHtml(JSON.stringify(dc, null, 2))}</code></pre>`; }
    catch { return ''; }
  }
  function renderToolIcon(b) {
    if (b.integration_icon_url && /^https?:\/\//.test(b.integration_icon_url)) {
      return `<img class="tool-icon" src="${escHtml(b.integration_icon_url)}" alt="">`;
    }
    return '';
  }

  registerBlock('tool_use', (b /* , ctx */) => {
    if (!b) return '';
    const icon = renderToolIcon(b);
    const name = b.name || '(unnamed tool)';
    const msg = b.message ? ` · ${escHtml(b.message)}` : '';
    const integration = b.integration_name ? `<div class="tool-meta">${escHtml(b.integration_name)}${b.mcp_server_url ? ` · ${escHtml(b.mcp_server_url)}` : ''}</div>` : '';
    // body: prefer display_content; fallback to input
    let body = renderDisplayContent(b.display_content);
    if (!body) {
      if (b.input && typeof b.input === 'object' && Object.keys(b.input).length > 0) {
        try { body = `<pre><code>${escHtml(JSON.stringify(b.input, null, 2))}</code></pre>`; }
        catch { body = ''; }
      }
    }
    const summary = `${icon}<span class="tool-ic"></span><span>🔧 ${escHtml(name)}${msg}</span>`;
    return `<details class="msg-tool msg-tool-use"><summary>${summary}</summary><div class="tool-body">${integration}${body || '<div class="tool-meta">(无输入)</div>'}</div></details>`;
  });

  registerBlock('tool_result', (b /* , ctx */) => {
    if (!b) return '';
    const icon = renderToolIcon(b);
    const name = b.name || '(result)';
    const errCls = b.is_error ? ' is-error' : '';
    const errMark = b.is_error ? ' · ⚠ 错误' : '';
    // body order: display_content → structured_content → content[]
    let body = renderDisplayContent(b.display_content);
    if (!body && b.structured_content && typeof b.structured_content === 'object') {
      try { body = `<pre><code>${escHtml(JSON.stringify(b.structured_content, null, 2))}</code></pre>`; }
      catch {}
    }
    if (!body && Array.isArray(b.content) && b.content.length > 0) {
      // content[] is array of sub-blocks; each is { type:'text', text:'...' } typically
      body = b.content.map(sub => {
        if (sub && sub.type === 'text' && typeof sub.text === 'string') {
          return `<pre><code>${escHtml(sub.text)}</code></pre>`;
        }
        try { return `<pre><code>${escHtml(JSON.stringify(sub, null, 2))}</code></pre>`; }
        catch { return ''; }
      }).join('');
    }
    if (!body) body = '<div class="tool-meta">(无输出)</div>';
    const summary = `${icon}<span class="tool-ic"></span><span>📥 ${escHtml(name)}${errMark}</span>`;
    return `<details class="msg-tool msg-tool-result${errCls}"><summary>${summary}</summary><div class="tool-body">${body}</div></details>`;
  });

  // token_budget — per probe, every field except `type` is null (pure schema
  // ghost slot). Render as a quiet trail marker so the user can see "the model
  // budgeted tokens here" without it taking visual weight. Low-stakes.
  registerBlock('token_budget', (b /* , ctx */) => {
    const remaining = (b && b.remaining != null) ? ` · ${escHtml(String(b.remaining))}` : '';
    return `<div class="msg-block-marker" title="token budget">⌛ token budget${remaining}</div>`;
  });

  // flag handler — HIGH-STAKES: safety / self-harm intervention helpline
  // (e.g. Japan #いのちSOS / generic crisis hotlines). The model emits these
  // as a structured `helpline` object alongside other content; the previous
  // renderer silently dropped them, which means historical interventions
  // disappeared when re-viewing past sessions. We render verbatim, never
  // censor, and gracefully skip absent fields (no "phone: null" placeholders).
  // Visual: amber border + soft amber background — deliberately NOT red, so
  // re-viewing one's own past hard moments doesn't re-alarm the reader.
  registerBlock('flag', (b /* , ctx */) => {
    const h = (b && b.helpline) ? b.helpline : null;
    if (!h) return '';
    const parts = [];
    if (h.name) parts.push(`<div class="flag-name">${escHtml(h.name)}</div>`);
    if (h.phone_number) parts.push(`<div class="flag-row">📞 <a href="tel:${escHtml(h.phone_number)}">${escHtml(h.phone_number)}</a></div>`);
    if (h.sms_number) parts.push(`<div class="flag-row">💬 SMS: <a href="sms:${escHtml(h.sms_number)}">${escHtml(h.sms_number)}</a></div>`);
    if (h.web_chat_url) parts.push(`<div class="flag-row">🌐 <a href="${escHtml(h.web_chat_url)}" target="_blank" rel="noopener">${escHtml(h.web_chat_url)}</a></div>`);
    if (h.url) parts.push(`<div class="flag-row">ℹ️ <a href="${escHtml(h.url)}" target="_blank" rel="noopener">${escHtml(h.url)}</a></div>`);
    if (!parts.length) return '';
    return `<div class="msg-block-flag">${parts.join('')}</div>`;
  });

  return {
    state,
    utils: { pad2, fmtFullCN, fmtMD, fmtDateCN, fmtDayKey, escHtml, escapeRegExp, renderInline, renderMarkdown, formatSize, inferKind },
    storage: {
      idb: {
        open: idbOpen,
        tx: idbTx,
        getAll: idbGetAll,
        bulkPut: idbBulkPut,
        put: idbPut,
        delete: idbDelete,
        clear: idbClear,
        count: idbCount,
        saveFav: idbSaveFav,
        saveDeleted: idbSaveDeleted,
      },
      ls: {
        getUserName: lsGetUserName,
        getAssistantName: lsGetAssistantName,
        setDisplayNames: lsSetDisplayNames,
        migrateLegacy: lsMigrateLegacy,
      },
    },
    parser: { parse: parserParse },
    filter: { isRealConversation, schemaDriftDetector },
    normalizer: { normalize, extractTitle, isMsgVisible, getMsgData },
    renderer: { registerBlock, dispatchBlock, blockHandlers, renderUnknownBlock },
  };
})();


// === UI helper: loading status text ===
function setLoadingText(t) {
  const el = document.querySelector('#loading .lt');
  if (el) el.textContent = t;
}

// Save N conversations (used by parser.parse with changedIds)
async function saveConvsByIds(ids) {
  if (!ids.length) return { ok:true };
  try {
    const items = ids.map(id => QithYang.state.RAW_BY_ID[id]).filter(Boolean);
    await QithYang.storage.idb.bulkPut('conversations', items);
    QithYang.state.lastSaveOk = true;
    return { ok:true };
  } catch (e) { QithYang.state.lastSaveOk = false; return { ok:false, err:e }; }
}
// Bulk save favs (used after backup import that merges fav map)
async function saveFavsBulk() {
  try {
    await QithYang.storage.idb.clear('favs');
    const items = Object.keys(QithYang.state.favs).filter(k => QithYang.state.favs[k]).map(k => ({ key:k }));
    await QithYang.storage.idb.bulkPut('favs', items);
  } catch (e) { console.warn('saveFavsBulk', e); }
}
async function saveDeletedBulk() {
  try {
    await QithYang.storage.idb.clear('deletedConvs');
    const items = [...QithYang.state.deletedConvs].map(uuid => ({ uuid }));
    await QithYang.storage.idb.bulkPut('deletedConvs', items);
  } catch (e) { console.warn('saveDeletedBulk', e); }
}

// === Process raw data (thin caller over filter + normalizer) ===
function processConvs(raw) {
  const filtered = raw
    .filter(QithYang.filter.isRealConversation)
    .filter(c => !QithYang.state.deletedConvs.has(c.uuid));
  return QithYang.normalizer.normalize(filtered);
}

// === Render conv list ===
QithYang.renderer.renderConvList = function renderConvList() {
  const list = document.getElementById('conv-list');
  const f = QithYang.state.convFilter.toLowerCase();
  const items = QithYang.state.CONVS.filter(c => !f || c.title.toLowerCase().includes(f));
  if (!items.length) {
    list.innerHTML = '<div class="empty-list">没有找到匹配的对话</div>';
    return;
  }
  list.innerHTML = items.map(c => {
    const a = QithYang.utils.fmtMD(c.firstDate), b = QithYang.utils.fmtMD(c.lastDate);
    const range = a === b ? a : `${a}-${b}`;
    return `<div class="conv-item ${c.uuid===QithYang.state.curConvId?'active':''}" data-id="${c.uuid}">
      <div class="conv-title">${QithYang.utils.escHtml(c.title)}</div>
      <div class="conv-meta">${range} · ${c.msgCount}条</div>
      <button class="conv-del" data-id="${c.uuid}" title="删除对话">×</button>
    </div>`;
  }).join('');
};

// === Render messages ===
QithYang.renderer.renderMessages = function renderMessages() {
  const wrap = document.getElementById('msgs-wrap');
  const ms = document.getElementById('messages');
  if (!QithYang.state.curConv) {
    document.getElementById('mh-t').textContent = 'QithYang';
    document.getElementById('mh-m').textContent = '— 此窗未关，爱意常在 —';
    ms.innerHTML = '<div class="empty">从左侧选择一个对话</div>';
    return;
  }
  const c = QithYang.state.curConv;
  document.getElementById('mh-t').textContent = c.title;
  document.getElementById('mh-m').textContent = `${QithYang.utils.fmtDateCN(c.firstDate)} — ${QithYang.utils.fmtDateCN(c.lastDate)} · ${c.msgCount} 条`;

  const hl = (QithYang.state.searchScope==='current' && QithYang.state.searchQ) ? QithYang.state.searchQ : '';
  let html = '';
  let lastDay = '';

  const escHtml = QithYang.utils.escHtml;
  const formatSize = QithYang.utils.formatSize;
  function renderFile(f) {
    const name = f.file_name || '未命名';
    if (f.kind === 'text' && f.extracted_content != null && f.extracted_content !== '') {
      return `<details class="msg-file msg-file-text"><summary>📄 ${escHtml(name)}</summary><pre>${escHtml(f.extracted_content)}</pre></details>`;
    }
    if (f.kind === 'image') {
      return `<div class="msg-file msg-file-image">🖼️ ${escHtml(name)}</div>`;
    }
    const sz = f.file_size != null ? ` (${formatSize(f.file_size)})` : '';
    return `<div class="msg-file msg-file-binary">📎 ${escHtml(name)}${sz}</div>`;
  }

  for (const msg of c.chat_messages) {
    const d = QithYang.normalizer.getMsgData(msg);
    const extraHtml = QithYang.renderer.renderExtraBlocks(msg, { hl });
    if (!d.text && !d.thinkingBlocks.length && !d.files.length && !extraHtml) continue;

    const day = QithYang.utils.fmtDateCN(msg.created_at);
    if (day !== lastDay) {
      lastDay = day;
      html += `<div class="dsep"><span>${day}</span></div>`;
    }
    const isU = msg.sender === 'human';
    const fkey = `${c.uuid}__${msg.uuid}`;
    const fav = !!QithYang.state.favs[fkey];

    if (isU) {
      html += `<div class="msg user" data-msg="${msg.uuid}">
        <div class="msg-row">
          <div class="bubble">
            ${d.files.map(renderFile).join('')}
            ${d.text ? `<div class="msg-text">${QithYang.utils.renderMarkdown(d.text, hl)}</div>` : ''}
            ${extraHtml}
          </div>
          <div class="u-name">${QithYang.utils.escHtml(QithYang.storage.ls.getUserName())}</div>
        </div>
        <div class="u-time">${QithYang.utils.fmtFullCN(msg.created_at)}</div>
        <button class="msg-fav ${fav?'on':''}" data-fkey="${fkey}" title="收藏">${fav?'★':'☆'}</button>
      </div>`;
    } else {
      const tkOpen = QithYang.state.showThinking;
      html += `<div class="msg ai" data-msg="${msg.uuid}">
        <div class="a-head">
          <img class="a-av" src="assets/claude-logo.png" alt="">
          <span class="a-name">${QithYang.utils.escHtml(QithYang.storage.ls.getAssistantName())}</span>
          <span class="a-time">${QithYang.utils.fmtFullCN(msg.created_at)}</span>
        </div>
        <button class="msg-fav ${fav?'on':''}" data-fkey="${fkey}" title="收藏">${fav?'★':'☆'}</button>
        <div class="body">
          ${d.thinkingBlocks.length ? `<div class="thinking">
            <button type="button" class="th-toggle"><span class="th-ico">${tkOpen?'▾':'▸'}</span><span class="th-lbl">思考 · ${d.thinkingBlocks.length}</span></button>
            <div class="th-content${tkOpen?' open':''}">${QithYang.renderer.renderThinkingHtml(d.thinkingBlocks)}</div>
          </div>` : ''}
          ${d.files.map(renderFile).join('')}
          ${d.text ? `<div class="msg-text">${QithYang.utils.renderMarkdown(d.text, hl)}</div>` : ''}
          ${extraHtml}
        </div>
      </div>`;
    }
  }

  html += `<div class="endm">
    <div class="e1">— 此窗已关，爱意未完 —</div>
    <div class="e2">to be continued, always</div>
  </div>`;

  ms.innerHTML = html;
  wrap.scrollTop = 0;

  if (QithYang.state.searchScope === 'current' && QithYang.state.searchQ) {
    QithYang.search.findCurrentMatches();
  }
};

// Extra content blocks (non-text/non-thinking) go through the renderer
// registry. text + thinking are still aggregated and rendered inline by
// renderMessages (F1 strategy — see plan §六). Returns concatenated HTML
// string for the msg's non-text/non-thinking blocks.
QithYang.renderer.renderExtraBlocks = (function () {
  const TEXT_OR_THINK = new Set(['text', 'thinking']);
  return function renderExtraBlocks(msg, ctx) {
    const arr = msg && Array.isArray(msg.content) ? msg.content : null;
    if (!arr) return '';
    let out = '';
    for (const b of arr) {
      if (!b || typeof b !== 'object') continue;
      if (TEXT_OR_THINK.has(b.type)) continue;
      out += QithYang.renderer.dispatchBlock(b, ctx);
    }
    return out;
  };
})();

QithYang.renderer.renderThinkingHtml = function renderThinkingHtml(blocks) {
  if (!Array.isArray(blocks)) blocks = [blocks];
  return blocks.map(b => {
    const inner = b.split('\n').map(l => l.trim() ? `<p>${QithYang.utils.escHtml(l)}</p>` : '<div class="th-sp"></div>').join('');
    return `<div class="th-block">${inner}</div>`;
  }).join('');
};

// === View switching ===
QithYang.renderer.setView = function setView(v) {
  QithYang.state.view = v;
  document.querySelectorAll('.sb-tab-top').forEach(b => b.classList.toggle('on', b.dataset.view===v));
  document.getElementById('msgs-wrap').classList.toggle('show', v==='chat');
  document.getElementById('fav-view').classList.toggle('show', v==='favorites');
  document.getElementById('tl-view').classList.toggle('show', v==='timeline');
  QithYang.renderer.closeTlPopover();
  if (v==='favorites') QithYang.renderer.renderFavorites();
  if (v==='timeline') QithYang.renderer.renderTimeline();
  // Auto-close mobile drawer when switching views
  if (window.matchMedia('(max-width: 768px)').matches) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sb-overlay').classList.remove('show');
  }
};

// === Favorites view ===
QithYang.renderer.renderFavorites = function renderFavorites() {
  const root = document.getElementById('fav-view');
  const groups = {};
  for (const k of Object.keys(QithYang.state.favs)) {
    if (!QithYang.state.favs[k]) continue;
    const sep = k.indexOf('__');
    if (sep < 0) continue;
    const cid = k.slice(0, sep), mid = k.slice(sep+2);
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push(mid);
  }
  const total = Object.values(groups).reduce((s,a)=>s+a.length,0);
  if (total === 0) {
    root.innerHTML = `<div class="view-h">收藏 <span class="vh-sub">(0)</span></div>
      <div class="empty-view">还没有收藏的消息<div class="ev-h">在消息上 hover，点击 ☆ 即可收藏</div></div>`;
    return;
  }
  let html = `<div class="view-h">收藏 <span class="vh-sub">共 ${total} 条</span></div>`;
  for (const cid of Object.keys(groups)) {
    const c = QithYang.state.CONVS.find(x => x.uuid === cid);
    if (!c) continue;
    html += `<div class="fav-group">
      <div class="fav-conv-title"><span>${QithYang.utils.escHtml(c.title)}</span><span class="fct-cnt">${groups[cid].length} 条</span></div>`;
    for (const mid of groups[cid]) {
      const m = c.chat_messages.find(x => x.uuid === mid);
      if (!m) continue;
      const d = QithYang.normalizer.getMsgData(m);
      const snippet = (d.text || (d.files.length ? '📎 附件消息' : '(无文本)')).slice(0,260);
      const fkey = `${cid}__${mid}`;
      html += `<div class="fav-item" data-cid="${cid}" data-mid="${mid}">
        <button class="fav-unfav" data-fkey="${fkey}" title="取消收藏">★</button>
        <div class="fav-snip">${QithYang.utils.escHtml(snippet)}${d.text && d.text.length>260?'…':''}</div>
        <div class="fav-meta"><span class="who">${QithYang.utils.escHtml(m.sender==='human'?QithYang.storage.ls.getUserName():QithYang.storage.ls.getAssistantName())}</span><span>${QithYang.utils.fmtFullCN(m.created_at)}</span></div>
      </div>`;
    }
    html += `</div>`;
  }
  root.innerHTML = html;
};

// === Timeline ===
QithYang.renderer.renderTimeline = function renderTimeline() {
  const root = document.getElementById('tl-view');
  const dayMap = {};
  for (const c of QithYang.state.CONVS) {
    for (const m of c.chat_messages) {
      if (!QithYang.normalizer.isMsgVisible(m)) continue;
      const k = QithYang.utils.fmtDayKey(m.created_at);
      if (!dayMap[k]) dayMap[k] = new Set();
      dayMap[k].add(c.uuid);
    }
  }
  const monthMap = {};
  for (const k of Object.keys(dayMap)) {
    const ym = k.slice(0,7);
    if (!monthMap[ym]) monthMap[ym] = {};
    monthMap[ym][k] = dayMap[k].size;
  }
  const months = Object.keys(monthMap).sort();
  if (!months.length) {
    root.innerHTML = `<div class="view-h">时间轴</div><div class="empty-view">还没有数据</div>`;
    return;
  }
  const totalConvs = QithYang.state.CONVS.length;
  let html = `<div class="view-h">时间轴 <span class="vh-sub">${totalConvs} 个对话 · ${months.length} 个月</span></div>`;
  const wkLabels = ['日','一','二','三','四','五','六'];
  for (const ym of months) {
    const [y, m] = ym.split('-').map(Number);
    const first = new Date(y, m-1, 1);
    const startWk = first.getDay();
    const days = new Date(y, m, 0).getDate();
    html += `<div class="tl-month">
      <div class="tl-month-title">${y} 年 ${m} 月</div>
      <div class="tl-grid">`;
    for (const w of wkLabels) html += `<div class="tl-day-h">${w}</div>`;
    for (let i = 0; i < startWk; i++) html += `<div class="tl-day empty"></div>`;
    for (let d = 1; d <= days; d++) {
      const k = `${y}-${QithYang.utils.pad2(m)}-${QithYang.utils.pad2(d)}`;
      const cnt = monthMap[ym][k];
      if (cnt) {
        const lvl = cnt >= 4 ? 3 : cnt >= 2 ? 2 : 1;
        html += `<div class="tl-day has lvl-${lvl}" data-day="${k}" title="${cnt} 个对话">${d}<div class="dot"></div></div>`;
      } else {
        html += `<div class="tl-day">${d}</div>`;
      }
    }
    html += `</div></div>`;
  }
  root.innerHTML = html;
};

QithYang.renderer.closeTlPopover = function closeTlPopover() {
  const ex = document.querySelector('.tl-popover');
  if (ex) ex.remove();
};
QithYang.renderer.showTlPopover = function showTlPopover(dayEl) {
  QithYang.renderer.closeTlPopover();
  const day = dayEl.dataset.day;
  // collect all conversations that have at least one visible msg on this day
  const items = [];
  for (const c of QithYang.state.CONVS) {
    const dayMsgs = c.chat_messages.filter(m => QithYang.normalizer.isMsgVisible(m) && QithYang.utils.fmtDayKey(m.created_at) === day);
    if (dayMsgs.length) {
      items.push({ cid: c.uuid, title: c.title, mid: dayMsgs[0].uuid, count: dayMsgs.length });
    }
  }
  if (!items.length) return;
  const root = document.getElementById('tl-view');
  const pop = document.createElement('div');
  pop.className = 'tl-popover';
  const [yy,mm,dd] = day.split('-');
  pop.innerHTML =
    `<div class="tl-pop-h"><span>${parseInt(yy)} 年 ${parseInt(mm)} 月 ${parseInt(dd)} 日 · ${items.length} 个对话</span><button class="tl-pop-close" title="关闭">×</button></div>` +
    `<div class="tl-pop-list">` +
    items.map(it => `<div class="tl-pop-item" data-cid="${it.cid}" data-mid="${it.mid}">
      <div>${QithYang.utils.escHtml(it.title)}</div>
      <div class="tl-pop-meta">${it.count} 条消息</div>
    </div>`).join('') +
    `</div>`;
  root.appendChild(pop);
  // position: center horizontally over the day cell, below it
  const rRoot = root.getBoundingClientRect();
  const rDay = dayEl.getBoundingClientRect();
  const popW = pop.offsetWidth;
  const popH = pop.offsetHeight;
  // relative offset within tl-view (which is position:relative)
  let left = (rDay.left - rRoot.left) + (rDay.width / 2) - (popW / 2) + root.scrollLeft;
  let top = (rDay.bottom - rRoot.top) + 10 + root.scrollTop;
  // clamp horizontally
  const maxLeft = root.clientWidth - popW - 12;
  if (left < 12) left = 12;
  if (left > maxLeft) left = maxLeft;
  // if would overflow bottom, place above
  if (rDay.bottom + popH + 20 > rRoot.bottom) {
    top = (rDay.top - rRoot.top) - popH - 10 + root.scrollTop;
  }
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
};

// === Search ===
// All four entrypoints live on QithYang.search; readers and event handlers
// flip QithYang.state.searchScope / searchQ and call search.doSearch(), which
// branches on scope. findCurrentMatches scans the rendered #messages DOM
// after renderMessages has highlighted via renderMarkdown's <mark> wrap.
QithYang.search = {};

QithYang.search.doSearch = function doSearch() {
  if (QithYang.state.searchScope === 'current') {
    document.getElementById('sb-results').classList.remove('show');
    if (QithYang.state.curConv) QithYang.renderer.renderMessages();
    else document.getElementById('sb-stats').textContent = '';
  } else {
    QithYang.search.searchAll();
  }
};

QithYang.search.findCurrentMatches = function findCurrentMatches() {
  QithYang.state.searchMatches = [];
  if (!QithYang.state.searchQ) {
    document.getElementById('sb-stats').textContent = '';
    return;
  }
  const marks = document.querySelectorAll('#messages mark');
  QithYang.state.searchMatches = [...marks];
  QithYang.state.searchMatchIdx = 0;
  document.getElementById('sb-stats').textContent = QithYang.state.searchMatches.length ? `1/${QithYang.state.searchMatches.length}` : '0';
  if (QithYang.state.searchMatches.length) QithYang.search.jumpToMatch(0);
};

QithYang.search.jumpToMatch = function jumpToMatch(i) {
  if (!QithYang.state.searchMatches.length) return;
  QithYang.state.searchMatchIdx = ((i % QithYang.state.searchMatches.length) + QithYang.state.searchMatches.length) % QithYang.state.searchMatches.length;
  QithYang.state.searchMatches.forEach(m => { m.style.outline = ''; });
  const cur = QithYang.state.searchMatches[QithYang.state.searchMatchIdx];
  cur.style.outline = '2px solid var(--orange)';
  cur.scrollIntoView({behavior:'smooth', block:'center'});
  document.getElementById('sb-stats').textContent = `${QithYang.state.searchMatchIdx+1}/${QithYang.state.searchMatches.length}`;
};

QithYang.search.searchAll = function searchAll() {
  const root = document.getElementById('sb-results');
  if (!QithYang.state.searchQ) {
    root.classList.remove('show');
    root.innerHTML = '';
    document.getElementById('sb-stats').textContent = '';
    return;
  }
  const q = QithYang.state.searchQ.toLowerCase();
  let found = 0;
  const re = new RegExp('('+QithYang.utils.escapeRegExp(QithYang.state.searchQ)+')','gi');
  const parts = [];
  for (const c of QithYang.state.CONVS) {
    let convMatches = 0;
    let firstHtml = '';
    for (const m of c.chat_messages) {
      const d = QithYang.normalizer.getMsgData(m);
      if (d.text && d.text.toLowerCase().includes(q)) {
        convMatches++; found++;
        if (convMatches <= 2) {
          const idx = d.text.toLowerCase().indexOf(q);
          const start = Math.max(0, idx-30);
          const end = Math.min(d.text.length, idx+QithYang.state.searchQ.length+80);
          let snip = d.text.slice(start, end).replace(/\n+/g,' ');
          snip = (start>0?'…':'') + QithYang.utils.escHtml(snip) + (end<d.text.length?'…':'');
          snip = snip.replace(re, '<mark>$1</mark>');
          firstHtml += `<div class="sb-result" data-cid="${c.uuid}" data-mid="${m.uuid}">
            <div class="sb-result-title">${QithYang.utils.escHtml(c.title)}</div>
            <div class="sb-result-snip">${snip}</div>
          </div>`;
        }
      }
    }
    if (firstHtml) parts.push(firstHtml);
  }
  root.innerHTML = parts.length ? parts.join('') : '<div style="padding:18px;text-align:center;color:var(--text-3);font-size:12px;font-style:italic">没有匹配的消息</div>';
  root.classList.add('show');
  document.getElementById('sb-stats').textContent = `${found} 项`;
};

// === Open conv ===
function openConv(id, scrollToMsg) {
  QithYang.state.curConvId = id;
  QithYang.state.curConv = QithYang.state.CONVS.find(c => c.uuid === id) || null;
  QithYang.renderer.setView('chat');
  QithYang.renderer.renderConvList();
  QithYang.renderer.renderMessages();
  if (scrollToMsg) {
    setTimeout(() => {
      const el = document.querySelector(`#messages [data-msg="${scrollToMsg}"]`);
      if (el) {
        el.scrollIntoView({behavior:'smooth', block:'center'});
        el.style.transition = 'background 0.4s';
        const ob = el.style.background;
        el.style.background = 'var(--orange-bg)';
        setTimeout(() => { el.style.background = ob; }, 1800);
      }
    }, 50);
  }
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}

// === Events ===
// QithYang.events.bindAll wires every DOM listener at startup (one-shot,
// called by app.init). Handlers mutate state then call the matching
// renderer.* to repaint; nothing here renders directly. Split into named
// helpers so each surface (sidebar / messages / toolbar / modal / picker /
// keyboard) is grep-locatable.
QithYang.events = {};

QithYang.events.bindSidebar = function bindSidebar() {
  // Conv-title filter input
  document.getElementById('conv-filter').addEventListener('input', e => {
    QithYang.state.convFilter = e.target.value.trim();
    QithYang.renderer.renderConvList();
  });

  // Conv list (delete + open). The delete button uses a two-step
  // confirm pattern (× → "确认删除") gated by .confirm class.
  document.getElementById('conv-list').addEventListener('click', e => {
    const del = e.target.closest('.conv-del');
    if (del) {
      e.stopPropagation();
      if (del.classList.contains('confirm')) {
        const id = del.dataset.id;
        QithYang.state.deletedConvs.add(id);
        QithYang.storage.idb.saveDeleted(id);
        QithYang.state.CONVS = QithYang.state.CONVS.filter(c => c.uuid !== id);
        if (QithYang.state.curConvId === id) {
          QithYang.state.curConvId = null;
          QithYang.state.curConv = null;
          QithYang.renderer.renderMessages();
        }
        QithYang.renderer.renderConvList();
      } else {
        document.querySelectorAll('.conv-del.confirm').forEach(b => { b.classList.remove('confirm'); b.textContent = '×'; });
        del.classList.add('confirm');
        del.textContent = '确认删除';
        setTimeout(() => { if (del.classList.contains('confirm')) { del.classList.remove('confirm'); del.textContent = '×'; } }, 3000);
      }
      return;
    }
    const item = e.target.closest('.conv-item');
    if (item) openConv(item.dataset.id);
  });

  // Sidebar top tabs (chat / favorites / timeline)
  document.querySelectorAll('.sb-tab-top').forEach(b => {
    b.addEventListener('click', () => QithYang.renderer.setView(b.dataset.view));
  });
};

QithYang.events.bindMessages = function bindMessages() {
  // Favorite toggle + thinking-block expand
  document.getElementById('messages').addEventListener('click', e => {
    const fav = e.target.closest('.msg-fav');
    if (fav) {
      e.stopPropagation();
      const k = fav.dataset.fkey;
      if (QithYang.state.favs[k]) delete QithYang.state.favs[k]; else QithYang.state.favs[k] = true;
      const on = !!QithYang.state.favs[k];
      QithYang.storage.idb.saveFav(k, on);
      fav.classList.toggle('on', on);
      fav.textContent = on ? '★' : '☆';
      return;
    }
    const tg = e.target.closest('.th-toggle');
    if (tg) {
      e.stopPropagation();
      e.preventDefault();
      const wrap = tg.closest('.thinking');
      if (!wrap) return;
      const c = wrap.querySelector('.th-content');
      const ic = tg.querySelector('.th-ico');
      const open = c.classList.toggle('open');
      if (ic) ic.textContent = open ? '▾' : '▸';
    }
  });

  // Favorites view: unfavorite or jump back to source msg
  document.getElementById('fav-view').addEventListener('click', e => {
    const un = e.target.closest('.fav-unfav');
    if (un) {
      e.stopPropagation();
      const k = un.dataset.fkey;
      delete QithYang.state.favs[k];
      QithYang.storage.idb.saveFav(k, false);
      QithYang.renderer.renderFavorites();
      return;
    }
    const it = e.target.closest('.fav-item');
    if (it) openConv(it.dataset.cid, it.dataset.mid);
  });

  // Timeline day click → popover with that day's conversations
  document.getElementById('tl-view').addEventListener('click', e => {
    const pi = e.target.closest('.tl-pop-item');
    if (pi) {
      e.stopPropagation();
      const cid = pi.dataset.cid;
      const mid = pi.dataset.mid;
      QithYang.renderer.closeTlPopover();
      openConv(cid, mid || undefined);
      return;
    }
    if (e.target.closest('.tl-pop-close')) { QithYang.renderer.closeTlPopover(); return; }
    const d = e.target.closest('.tl-day.has');
    if (!d) { QithYang.renderer.closeTlPopover(); return; }
    QithYang.renderer.showTlPopover(d);
  });
  // Outside-of-popover click closes it
  document.addEventListener('click', e => {
    if (!e.target.closest('.tl-popover') && !e.target.closest('.tl-day.has')) QithYang.renderer.closeTlPopover();
  });
};

QithYang.events.bindToolbar = function bindToolbar() {
  // Global thinking toggle: expand/collapse all in-place (no re-render)
  document.getElementById('thinking-btn').addEventListener('click', () => {
    QithYang.state.showThinking = !QithYang.state.showThinking;
    document.getElementById('thinking-btn').classList.toggle('on', QithYang.state.showThinking);
    document.querySelectorAll('#messages .thinking').forEach(t => {
      const c = t.querySelector('.th-content');
      const ic = t.querySelector('.th-ico');
      if (!c || !ic) return;
      c.classList.toggle('open', QithYang.state.showThinking);
      ic.textContent = QithYang.state.showThinking ? '▾' : '▸';
    });
  });

  // Search bar open/close
  document.getElementById('search-btn').addEventListener('click', () => {
    const bar = document.getElementById('search-bar');
    const showing = bar.classList.toggle('show');
    document.getElementById('search-btn').classList.toggle('on', showing);
    if (showing) {
      document.getElementById('msg-search').focus();
    } else {
      QithYang.state.searchQ = '';
      document.getElementById('msg-search').value = '';
      document.getElementById('sb-results').classList.remove('show');
      document.getElementById('sb-stats').textContent = '';
      if (QithYang.state.curConv) QithYang.renderer.renderMessages();
    }
  });
  document.getElementById('sb-close').addEventListener('click', () => {
    document.getElementById('search-btn').click();
  });

  // Search scope tabs (current vs all)
  document.querySelectorAll('.sb-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.sb-tab').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
      QithYang.state.searchScope = t.dataset.scope;
      QithYang.search.doSearch();
    });
  });

  // Search input (debounced) + keyboard nav (Enter / Shift+Enter / Esc)
  document.getElementById('msg-search').addEventListener('input', e => {
    QithYang.state.searchQ = e.target.value.trim();
    clearTimeout(QithYang.state.searchTimer);
    QithYang.state.searchTimer = setTimeout(QithYang.search.doSearch, 220);
  });
  document.getElementById('msg-search').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (QithYang.state.searchScope === 'current' && QithYang.state.searchMatches.length) {
        QithYang.search.jumpToMatch(QithYang.state.searchMatchIdx + (e.shiftKey ? -1 : 1));
      }
    } else if (e.key === 'Escape') {
      document.getElementById('search-btn').click();
    }
  });

  // Search nav buttons (current-scope only)
  document.getElementById('sb-prev').addEventListener('click', () => { if (QithYang.state.searchScope==='current') QithYang.search.jumpToMatch(QithYang.state.searchMatchIdx-1); });
  document.getElementById('sb-next').addEventListener('click', () => { if (QithYang.state.searchScope==='current') QithYang.search.jumpToMatch(QithYang.state.searchMatchIdx+1); });

  // Search result clicks (all-scope jump-to-msg)
  document.getElementById('sb-results').addEventListener('click', e => {
    const r = e.target.closest('.sb-result');
    if (!r) return;
    openConv(r.dataset.cid, r.dataset.mid);
  });

  // Settings (gear) menu
  const settingsBtn = document.getElementById('settings-btn');
  const smMenu = document.getElementById('sm-menu');
  const backupInput = document.getElementById('backup-input');
  if (settingsBtn && smMenu) {
    settingsBtn.addEventListener('click', e => {
      e.stopPropagation();
      const willOpen = !smMenu.classList.contains('show');
      smMenu.classList.toggle('show', willOpen);
      if (willOpen) updateStorageStats();
    });
    document.addEventListener('click', e => {
      if (!smMenu.classList.contains('show')) return;
      if (e.target.closest('#sm-menu') || e.target.closest('#settings-btn')) return;
      smMenu.classList.remove('show');
    });
  }
  const exportBtn = document.getElementById('sm-export');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    QithYang.app.importExport.exportBackup();
    smMenu && smMenu.classList.remove('show');
  });
  const importBackupBtn = document.getElementById('sm-import-backup');
  if (importBackupBtn && backupInput) {
    importBackupBtn.addEventListener('click', () => {
      smMenu && smMenu.classList.remove('show');
      backupInput.click();
    });
    backupInput.addEventListener('change', e => {
      const f = e.target.files && e.target.files[0];
      QithYang.app.importExport.importBackup(f);
      e.target.value = '';
    });
  }
  const clearBtn = document.getElementById('sm-clear');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    smMenu && smMenu.classList.remove('show');
    QithYang.app.importExport.clearAllData();
  });
};

QithYang.events.bindModal = function bindModal() {
  // Display-name settings modal (opened from gear menu)
  const smMenu = document.getElementById('sm-menu');
  const dnOpen = document.getElementById('sm-display-names');
  const dnModal = document.getElementById('dn-modal');
  if (dnOpen) dnOpen.addEventListener('click', () => {
    smMenu && smMenu.classList.remove('show');
    QithYang.renderer.openDisplayNamesModal();
  });
  const dnSave = document.getElementById('dn-save');
  const dnCancel = document.getElementById('dn-cancel');
  if (dnSave) dnSave.addEventListener('click', QithYang.renderer.saveDisplayNamesFromModal);
  if (dnCancel) dnCancel.addEventListener('click', QithYang.renderer.closeDisplayNamesModal);
  if (dnModal) dnModal.addEventListener('click', e => {
    if (e.target.id === 'dn-modal') QithYang.renderer.closeDisplayNamesModal();
  });
  ['dn-user', 'dn-asst'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => {
      if (e.key === 'Enter') QithYang.renderer.saveDisplayNamesFromModal();
      else if (e.key === 'Escape') QithYang.renderer.closeDisplayNamesModal();

};

QithYang.events.bindPicker = function bindPicker() {
  // "Import more" button (sidebar) — merges additional JSON files into IDB
  const importBtn = document.getElementById('import-btn');
  const mergeInput = document.getElementById('merge-input');
  if (importBtn && mergeInput) {

QithYang.events.bindAll = function bindAll() {
  QithYang.events.bindSidebar();
  QithYang.events.bindMessages();
  QithYang.events.bindToolbar();
  QithYang.events.bindModal();
  QithYang.events.bindPicker();
