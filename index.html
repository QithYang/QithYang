// === Data management ===
// Counts are derived from state.CONVS (post-filter, post-soft-delete), so
// the gear panel reflects what the user actually sees. Using RAW_BY_ID
// would over-count by including the 10 empty-name conversations filtered
// out by Phase 3 and any soft-deleted conversations still cached in IDB.
function totalMsgCount() {
  let n = 0;
  for (const c of QithYang.state.CONVS) {
    if (typeof c.msgCount === 'number') n += c.msgCount;
  }
  return n;
}
function totalFavCount() {
  let n = 0;
  for (const k in QithYang.state.favs) if (QithYang.state.favs[k]) n++;
  return n;
}
function updateStorageStats() {
  const cn = document.getElementById('sm-conv-n');
  const mn = document.getElementById('sm-msg-n');
  const note = document.getElementById('sm-store-note');
  if (cn) cn.textContent = QithYang.state.CONVS.length;
  if (mn) mn.textContent = totalMsgCount();
  if (note) {
    const fn = totalFavCount();
    if (QithYang.state.lastSaveOk) note.textContent = `已自动保存到本地数据库 · ${fn} 条收藏`;
    else note.textContent = `⚠ 保存失败 · ${fn} 条收藏`;
  }
}
// === app + importExport ===
// QithYang.app.init bootstraps the whole UI (storage open, legacy migrate,
// IDB load, picker fallback, first-render). QithYang.app.importExport
// gathers every entry point that takes JSON in or pushes JSON out.
QithYang.app = {};
QithYang.app.importExport = {};

QithYang.app.importExport.exportBackup = function exportBackup() {
  const payload = {
    app: 'QithYang',
    version: 1,
    exportedAt: new Date().toISOString(),
    conversations: Object.values(QithYang.state.RAW_BY_ID),
    favs: QithYang.state.favs,
    deletedConvs: [...QithYang.state.deletedConvs],
  };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const d = new Date();
  const stamp = `${d.getFullYear()}${QithYang.utils.pad2(d.getMonth()+1)}${QithYang.utils.pad2(d.getDate())}-${QithYang.utils.pad2(d.getHours())}${QithYang.utils.pad2(d.getMinutes())}${QithYang.utils.pad2(d.getSeconds())}`;
  const fname = `QithYang-backup-${stamp}.json`;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
};

QithYang.app.importExport.importBackup = function importBackup(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    let data;
    try { data = JSON.parse(e.target.result); }
    catch (err) { alert('JSON 解析失败: ' + err.message); return; }
    let arr = null;
    if (Array.isArray(data)) arr = data;
    else if (Array.isArray(data.conversations)) arr = data.conversations;
    if (!arr) { alert('无法识别的备份文件（缺少 conversations 数组）'); return; }
    arr.forEach(QithYang.filter.schemaDriftDetector);
    const r = QithYang.parser.parse(arr);
    if (data.favs && typeof data.favs === 'object') {
      Object.assign(QithYang.state.favs, data.favs);
      await saveFavsBulk();
    }
    if (Array.isArray(data.deletedConvs)) {
      data.deletedConvs.forEach(id => QithYang.state.deletedConvs.add(id));
      await saveDeletedBulk();
    }
    QithYang.state.RAW = Object.values(QithYang.state.RAW_BY_ID);
    QithYang.state.CONVS = processConvs(QithYang.state.RAW);
    const sv = await saveConvsByIds(r.changedIds);
    QithYang.renderer.renderConvList();
    if (QithYang.state.view === 'favorites') QithYang.renderer.renderFavorites();
    if (QithYang.state.view === 'timeline') QithYang.renderer.renderTimeline();
    updateStorageStats();
    let msg = `备份已恢复：新增 ${r.added}，更新 ${r.updated}，跳过 ${r.kept}`;
    if (!sv.ok) msg += '\n⚠ 保存到本地数据库失败：' + (sv.err && sv.err.message || '未知错误');
    alert(msg);
  };
  reader.readAsText(file);
};

QithYang.app.importExport.mergeMoreFiles = function mergeMoreFiles(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  let pending = files.length;
  let totals = { added:0, updated:0, kept:0, errors:0, changedIds: [] };
  for (const f of files) {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const data = JSON.parse(e.target.result);
        const arr = Array.isArray(data) ? data : (Array.isArray(data?.conversations) ? data.conversations : null);
        if (!arr) { totals.errors++; }
        else {
          arr.forEach(QithYang.filter.schemaDriftDetector);
          const r = QithYang.parser.parse(arr);
          totals.added += r.added; totals.updated += r.updated; totals.kept += r.kept;
          totals.changedIds.push(...r.changedIds);
        }
      } catch(err) { totals.errors++; }
      if (--pending === 0) {
        QithYang.state.RAW = Object.values(QithYang.state.RAW_BY_ID);
        QithYang.state.CONVS = processConvs(QithYang.state.RAW);
        QithYang.renderer.renderConvList();
        if (QithYang.state.view === 'favorites') QithYang.renderer.renderFavorites();
        if (QithYang.state.view === 'timeline') QithYang.renderer.renderTimeline();
        const sv = await saveConvsByIds(totals.changedIds);
        updateStorageStats();
        let msg = `导入完成：新增 ${totals.added}，更新 ${totals.updated}，跳过 ${totals.kept}` + (totals.errors ? `，失败 ${totals.errors}` : '');
        if (!sv.ok) msg += '\n⚠ 保存到本地数据库失败：' + (sv.err && sv.err.message || '未知错误');
        alert(msg);
      }
    };
    reader.onerror = async () => {
      totals.errors++;
      if (--pending === 0) {
        QithYang.state.RAW = Object.values(QithYang.state.RAW_BY_ID);
        QithYang.state.CONVS = processConvs(QithYang.state.RAW);
        QithYang.renderer.renderConvList();
        await saveConvsByIds(totals.changedIds);
        updateStorageStats();
        alert('导入完成（含错误）');
      }
    };
    reader.readAsText(f);
  }
};

QithYang.app.importExport.clearAllData = async function clearAllData() {
  if (!confirm('确定清空所有数据吗？\n\n将删除：所有对话、收藏、已隐藏对话。')) return;
  if (!confirm('⚠ 最后确认\n\n此操作不可撤销。是否继续？')) return;
  try {
    await QithYang.storage.idb.clear('conversations');
    await QithYang.storage.idb.clear('favs');
    await QithYang.storage.idb.clear('deletedConvs');
  } catch (e) { console.warn('clear IDB failed', e); }
  // Legacy LS keys were one-time-migrated then removed by migrateLegacy at
  // startup (see QithYang.storage.ls.migrateLegacy); we don't re-remove them
  // here. localStorage display-name keys are intentionally preserved across
  // clearAllData so the user doesn't have to re-enter them.
  QithYang.state.RAW_BY_ID = {};
  QithYang.state.RAW = [];
  QithYang.state.CONVS = [];
  QithYang.state.favs = {};
  QithYang.state.deletedConvs = new Set();
  QithYang.state.curConvId = null; QithYang.state.curConv = null;
  alert('已清空所有数据，页面将刷新。');
  location.reload();
};

QithYang.app.importExport.setupPicker = function setupPicker() {
  const drop = document.getElementById('drop');
  const input = document.getElementById('file-input');
  function handle(file) {
    if (!file) return;
    document.getElementById('loading').style.display = 'flex';
    setLoadingText('正在解析 JSON…');
    const reader = new FileReader();
    reader.onload = async e => {
      let parsed;
      try { parsed = JSON.parse(e.target.result); }
      catch(err) {
        document.getElementById('loading').style.display = 'none';
        alert('JSON 解析失败: ' + err.message);
        return;
      }
      try {
        await startApp(parsed);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        alert('加载失败: ' + (err && err.message || err));
      }
    };
    reader.readAsText(file);
  }
  drop.addEventListener('click', () => input.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('on'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('on'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('on'); handle(e.dataTransfer.files[0]); });
  input.addEventListener('change', e => handle(e.target.files[0]));
};

function isDemoUuid(uuid) { return typeof uuid === 'string' && uuid.startsWith('demo-conv-'); }

async function startApp(data, opts) {
  opts = opts || {};
  QithYang.state.RAW_BY_ID = {};
  const arr = Array.isArray(data) ? data : (Array.isArray(data?.conversations) ? data.conversations : []);
  arr.forEach(QithYang.filter.schemaDriftDetector);
  const r = QithYang.parser.parse(arr);
  QithYang.state.RAW = Object.values(QithYang.state.RAW_BY_ID);
  QithYang.state.CONVS = processConvs(QithYang.state.RAW);
  if (!opts.fromCache && !opts.noPersist && r.changedIds.length) {
    setLoadingText(`正在保存 ${r.changedIds.length} 个对话到本地数据库…`);
    await saveConvsByIds(r.changedIds);
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('picker').classList.remove('show');
  document.getElementById('app').classList.add('show');
  QithYang.events.bindAll();
  QithYang.renderer.renderConvList();
  if (QithYang.state.CONVS.length) openConv(QithYang.state.CONVS[0].uuid);
  updateStorageStats();
}

QithYang.app.init = async function init() {
  setLoadingText('正在打开本地数据库…');
  try {
    await QithYang.storage.idb.open();
  } catch (e) {
    console.error('IndexedDB 不可用', e);
    setLoadingText('本地数据库不可用，请改用文件导入…');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('picker').classList.add('show');
    QithYang.app.importExport.setupPicker();
    return;
  }

  // One-time migration from old localStorage layout (xy_raw / xy_favs / xy_del)
  setLoadingText('正在迁移旧数据…');
  await QithYang.storage.ls.migrateLegacy();

  // Load all stores from IndexedDB
  setLoadingText('正在加载本地数据…');
  let convs, favRows, delRows;
  try {
    [convs, favRows, delRows] = await Promise.all([
      QithYang.storage.idb.getAll('conversations'),
      QithYang.storage.idb.getAll('favs'),
      QithYang.storage.idb.getAll('deletedConvs'),
    ]);
  } catch (e) {
    console.error('IDB getAll failed', e);
    convs = []; favRows = []; delRows = [];
  }

  // Clean up demo conversations that older builds accidentally persisted.
  // Demo uuids are stable (`demo-conv-001`..`003`); never keep them in IDB.
  const demoIdsInDb = (convs || []).filter(c => isDemoUuid(c.uuid)).map(c => c.uuid);
  if (demoIdsInDb.length) {
    for (const id of demoIdsInDb) { try { await QithYang.storage.idb.delete('conversations', id); } catch(e){} }
    convs = convs.filter(c => !isDemoUuid(c.uuid));
  }

  QithYang.state.favs = {};
  for (const f of favRows) QithYang.state.favs[f.key] = true;
  QithYang.state.deletedConvs = new Set(delRows.map(d => d.uuid));

  if (convs && convs.length) {
    setLoadingText(`正在恢复 ${convs.length} 个对话…`);
    await startApp(convs, { fromCache: true });
    return;
  }

  // No cached data — try user's private conversations.json (persist),
  // then the public demo (don't persist — it's just a placeholder).
  setLoadingText('正在读取数据文件…');
  let data = null;
  let persistFetched = true;
  try {
    const r = await fetch('./conversations.json');
    if (r.ok) data = await r.json();
  } catch(e) {}
  if (!data) {
    try {
      const r = await fetch('./demo-conversations.json');
      if (r.ok) { data = await r.json(); persistFetched = false; }
    } catch(e) {}
  }
  if (!data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('picker').classList.add('show');
    QithYang.app.importExport.setupPicker();
    return;
  }
  await startApp(data, { noPersist: !persistFetched });
};

QithYang.app.init();
</script>
